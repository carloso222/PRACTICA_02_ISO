name: Notificación por correo

on:
  push:
    branches:
      - main
      - feature_a
      - feature_b

jobs:
  enviar-correo:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL }}
          password: ${{ secrets.PASSWORD }}
          subject: Cambios en rama ${{ github.ref_name }}
          to: carlosolmedo0905@gmail.com
          from: GitHub Actions
          body: |
            Se hicieron cambios en la rama ${{ github.ref_name }}